<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Versión Caducada</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #ED1C24; --red-light: rgba(237,28,36,0.08); --red-mid: rgba(237,28,36,0.18); }

    html, body {
      height: 100%; width: 100%; background: #f2f2f2;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow', sans-serif;
    }

    .card {
      background: #fff; border: 3px solid var(--red); border-radius: 10px;
      width: min(88vw, 420px); padding: 48px 36px;
      display: flex; flex-direction: column; align-items: center; gap: 22px;
      box-shadow: 0 0 0 6px var(--red-light), 0 8px 32px rgba(237,28,36,0.12), 0 2px 8px rgba(0,0,0,0.06);
      animation: fadeIn 0.5s ease both;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    .icon-wrap {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--red-light); border: 2px solid var(--red-mid);
      display: flex; align-items: center; justify-content: center;
    }
    .icon-wrap svg { width: 32px; height: 32px; }

    .label-caducada {
      font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      color: var(--red); background: var(--red-light); border: 1px solid var(--red-mid);
      padding: 4px 12px; border-radius: 100px;
    }
    .message { font-size: 19px; font-weight: 700; color: #1a1a1a; text-align: center; line-height: 1.35; }
    .sub { font-size: 13px; color: #666; text-align: center; line-height: 1.6; }
    .divider { width:100%; height:1px; background: linear-gradient(to right, transparent, var(--red-mid), transparent); }

    /* Botón-icono principal */
    .btn-icon {
      display: block;
      width: 80px; height: 80px; border-radius: 18px; overflow: hidden;
      box-shadow: 0 4px 18px rgba(237,28,36,0.35);
      transition: transform .12s;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }
    .btn-icon:active { transform: scale(.94); }
    .btn-icon img { width: 80px; height: 80px; display: block; border: none; }

    /* Overlay modal */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .22s ease;
      z-index: 100;
    }
    .overlay.visible { opacity: 1; pointer-events: all; }

    .modal {
      background: #fff; border: 3px solid var(--red); border-radius: 14px;
      width: min(80vw, 300px); padding: 36px 24px 32px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
      transform: scale(.92) translateY(10px);
      transition: transform .22s ease;
    }
    .overlay.visible .modal { transform: scale(1) translateY(0); }

    .modal-text {
      font-size: 16px; font-weight: 700; color: #1a1a1a;
      text-align: center; line-height: 1.4;
    }

    /* Enlace-icono dentro del modal: <a> real para máxima compatibilidad */
    .modal-link {
      display: block;
      width: 80px; height: 80px; border-radius: 18px; overflow: hidden;
      box-shadow: 0 4px 18px rgba(237,28,36,0.35);
      transition: transform .12s;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
    }
    .modal-link:active { transform: scale(.94); }
    .modal-link img { width: 80px; height: 80px; display: block; }
  </style>
</head>
